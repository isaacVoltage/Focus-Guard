<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>FocusGuard Intermission</title>
  <link rel="stylesheet" href="ui-styles.css">
  <style>
    body { display: flex; justify-content: center; align-items: center; height: 90vh; background-color: #f8fafc; margin: 0; }
    .friction-box { max-width: 440px; width: 100%; border-top: 6px solid #3b82f6; text-align: center; padding: 25px; }
    
    /* Countdown Clock Sizing */
    .timer-display { font-size: 48px; font-weight: bold; color: #3b82f6; margin: 15px 0; font-variant-numeric: tabular-nums; }
    
    /* Locked Button Wrapper States */
    .options-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin: 20px 0; transition: all 0.3s ease; }
    .options-grid.locked { opacity: 0.4; pointer-events: none; filter: blur(1px); }
    
    .opt-btn { background: #f1f5f9; color: #1e293b; border: 1px solid #cbd5e1; padding: 12px; border-radius: 6px; cursor: pointer; font-weight: 500; font-size: 14px; transition: all 0.2s; }
    .opt-btn:hover { background: #e2e8f0; border-color: #94a3b8; }
  </style>
</head>
<body>
  <div class="friction-box card">
    <h1 style="font-size: 24px; margin-bottom: 6px;">🛡️ Pause for a Moment</h1>
    <h3 id="target-site" style="color: #64748b; margin-bottom: 5px; font-weight: 500;">domain.com</h3>
    
    <p id="instruction-text" style="font-size: 14px; color: #475569; margin: 0;">Please wait while FocusGuard breaks your impulse loop...</p>
    
    <div id="countdown-clock" class="timer-display">15s</div>
    
    <div id="options-box" class="options-grid locked">
      <button class="opt-btn" data-reason="Pure Habit/Impulse">🧠 Just Habit / Impulse</button>
      <button class="opt-btn" data-reason="Necessary Break">☕ Taking a Scheduled Break</button>
      <button class="opt-btn" data-reason="Work/Communication">💼 Required for Work</button>
      <button class="opt-btn" data-reason="Accidental Click">🔍 Searching for Something</button>
    </div>

    <button id="turn-back-btn" class="btn btn-danger" style="width: 100%; padding: 10px;">Nevermind, Go Back to Work</button>
  </div>
  <script src="friction.js"></script>
</body>
</html>
